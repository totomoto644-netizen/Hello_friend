<!DOCTYPE html>
<html>
<head>

<title>Hello_friend</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
 background:black;
 color:red;
 font-family:monospace;
 padding:20px;
 font-size:18px;
}

h2{
 font-size:32px;
}

button{
 font-size:20px;
 padding:12px 20px;
 margin-top:10px;
 cursor:pointer;
}

#info{
 margin-top:20px;
 white-space:pre-line;
}

/* адаптация для телефона */
@media (max-width:600px){

h2{
 font-size:24px;
}

button{
 width:100%;
 font-size:22px;
 padding:15px;
}

#info{
 font-size:16px;
}

}

</style>

</head>

<body>

<h2>:D Hello_friend</h2>

<button onclick="start()">Кнопочка :)</button>

<div id="info"></div>

<script>

function typeText(text, elementId, speed){

let i = 0;
let element = document.getElementById(elementId);
element.innerHTML = "";

function typing(){
 if(i < text.length){
   element.innerHTML += text.charAt(i);
   i++;
   setTimeout(typing, speed);
 }
}

typing();

}

function start(){

// уведомление
if (Notification.permission === "granted") {
 new Notification("Привет от Hello_friend :D");
} 
else if (Notification.permission !== "denied") {

 Notification.requestPermission().then(permission => {

   if (permission === "granted") {
     new Notification("Привет от Hello_friend :D");
   }

 });

}

// информация
let info = "";

info += "Браузер: " + navigator.userAgent + "\n";
info += "Язык: " + navigator.language + "\n";
info += "Экран: " + screen.width + "x" + screen.height + "\n";

info += "IP: 192.168.43.27\n";
info += "Камера: UltraVision 64MP\n";

typeText(info,"info",30);

}

</script>

</body>
</html>
