<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Супер Рисовалка</title>
    <style>
        body { 
            background: #1a1a1a; color: white; text-align: center; 
            font-family: sans-serif; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        
        h2 { margin: 10px 0; font-size: 1.2rem; }

        /* Контейнер для холста, чтобы он подстраивался под экран */
        .canvas-container {
            width: 95vw; height: 60vh;
            background: white; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            touch-action: none; /* Важно для мобилок */
        }
        
        canvas { width: 100%; height: 100%; border-radius: 10px; cursor: crosshair; }

        /* Палитра */
        .palette {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 8px; padding: 15px; width: 100%;
        }

        .color-btn {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid #fff; cursor: pointer; transition: 0.2s;
        }

        .color-btn:active { transform: scale(0.8); }

        /* Кнопки управления */
        .tools { margin-bottom: 20px; display: flex; gap: 10px; }
        
        button {
            padding: 12px 20px; border-radius: 8px; border: none;
            background: #444; color: white; font-weight: bold; cursor: pointer;
        }

        .active-tool { background: #007bff; }
        .eraser { background: #ff4757; }
    </style>
</head>
<body>

    <h2>Рисовалка 2.0 (Mobile Ready)</h2>

    <div class="canvas-container">
        <canvas id="paint"></canvas>
    </div>

    <div class="palette" id="colors">
        </div>

    <div class="tools">
        <button id="eraserBtn" class="eraser" onclick="useEraser()">ЛАСТИК</button>
        <button onclick="clearCanvas()">ОЧИСТИТЬ</button>
    </div>

    <script>
        const canvas = document.getElementById('paint');
        const ctx = canvas.getContext('2d');
        const colorsContainer = document.getElementById('colors');
        
        // Настройка размера холста
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let painting = false;
        let currentColor = '#000000';
        let isEraser = false;

        // Создаем палитру (радужный порядок)
        const rainbow = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3', '#000000', '#8B4513', '#777777'];
        rainbow.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.background = color;
            btn.onclick = () => {
                currentColor = color;
                isEraser = false;
                document.getElementById('eraserBtn').classList.remove('active-tool');
            };
            colorsContainer.appendChild(btn);
        });

        function useEraser() {
            isEraser = true;
            document.getElementById('eraserBtn').classList.add('active-tool');
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Логика рисования (универсальная: мышь + тач)
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function start(e) {
            painting = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function move(e) {
            if (!painting) return;
            const pos = getPos(e);
            ctx.lineWidth = isEraser ? 30 : 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = isEraser ? '#FFFFFF' : currentColor;
            
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stop() {
            painting = false;
        }

        // Слушатели для мышки
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        // Слушатели для телефона
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, {passive: false});
        canvas.addEventListener('touchend', stop);

    </script>
</body>
</html>
