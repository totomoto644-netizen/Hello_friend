<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Тест</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

.question{
margin:20px 0;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:20px;
}

.result{
font-size:24px;
margin-top:20px;
color:gold;
}
</style>
</head>

<body>

<h1>🧠 Мини IQ тест</h1>

<div class="question">
<p>1. Что дальше? 2, 6, 12, 20, ?</p>
<label><input type="radio" name="q1" value="0"> 28</label><br>
<label><input type="radio" name="q1" value="1"> 30</label><br>
<label><input type="radio" name="q1" value="0"> 32</label>
</div>

<div class="question">
<p>2. Лишнее слово?</p>
<label><input type="radio" name="q2" value="0"> Стол</label><br>
<label><input type="radio" name="q2" value="1"> Банан</label><br>
<label><input type="radio" name="q2" value="0"> Стул</label>
</div>

<div class="question">
<p>3. 1, 4, 9, 16, 25, ?</p>
<label><input type="radio" name="q3" value="0"> 30</label><br>
<label><input type="radio" name="q3" value="1"> 36</label><br>
<label><input type="radio" name="q3" value="0"> 40</label>
</div>

<div class="question">
<p>4. 5 яблок − 2 = ?</p>
<label><input type="radio" name="q4" value="0"> 2</label><br>
<label><input type="radio" name="q4" value="1"> 3</label><br>
<label><input type="radio" name="q4" value="0"> 5</label>
</div>

<div class="question">
<p>5. Сколько дней в неделе?</p>
<label><input type="radio" name="q5" value="1"> 7</label><br>
<label><input type="radio" name="q5" value="0"> 5</label><br>
<label><input type="radio" name="q5" value="0"> 10</label>
</div>

<button onclick="checkIQ()">Проверить результат</button>

<div class="result" id="result"></div>

<script>

function checkIQ(){

let score = 0

let answers = document.querySelectorAll("input[type=radio]:checked")

answers.forEach(a=>{
score += Number(a.value)
})

let resultText = ""

if(score == 5){
resultText = "🧠 Очень высокий результат!"
}
else if(score >=3){
resultText = "🙂 Неплохая логика!"
}
else{
resultText = "🤔 Попробуй ещё раз!"
}

document.getElementById("result").innerText = "Правильных ответов: "+score+"/5 — "+resultText

}

</script>

</body>
</html>
